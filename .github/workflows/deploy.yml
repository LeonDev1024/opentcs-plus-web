name: Deploy to Server

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            cd /opt/opentcs-deploy
            
            # 克隆最新代码
            if [ -d "opentcs-plus-web" ]; then
              cd opentcs-plus-web
              git fetch origin
              git reset --hard origin/master
            else
              git clone https://github.com/LeonDev1024/opentcs-plus-web.git opentcs-plus-web
              cd opentcs-plus-web
            fi
            
            # 构建并启动前端
            docker build -t opentcs-web:latest -f script/deploy/frontend/Dockerfile .
            
            # 停止旧容器
            docker stop opentcs-web 2>/dev/null || true
            docker rm opentcs-web 2>/dev/null || true
            
            # 启动新容器
            docker run -d --name opentcs-web -p 80:80 opentcs-web:latest
            
            echo "Frontend deployment completed!"
