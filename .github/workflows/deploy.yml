name: Deploy to Server

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            # 登录 GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新前端镜像
            docker pull ghcr.io/LeonDev1024/opentcs-plus-web/frontend:latest

            # 进入部署目录
            cd /opt/opentcs-deploy

            # 更新 docker-compose.yml 中的前端镜像
            sed -i 's|ghcr.io/LeonDev1024/opentcs-plus-web/frontend:latest|ghcr.io/LeonDev1024/opentcs-plus-web/frontend:latest|g' docker-compose.yml

            # 只重启前端服务
            docker compose up -d frontend

            echo "Frontend deployment completed!"
