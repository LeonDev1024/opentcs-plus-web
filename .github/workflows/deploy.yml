name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'
  IMAGE_NAME: leondev1024/opentcs-plus-web

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha

      - name: Build and push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: script/deploy/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            # 进入部署目录
            cd /opt/opentcs-deploy
            
            # 克隆最新代码（或使用已有的）
            if [ ! -d "opentcs-plus-web" ]; then
              git clone https://github.com/LeonDev1024/opentcs-plus-web.git opentcs-plus-web
            fi
            
            cd opentcs-plus-web
            
            # 拉取最新代码
            git pull origin master
            
            # 构建并启动前端
            docker build -t opentcs-web:latest -f script/deploy/frontend/Dockerfile .
            
            # 停止旧容器
            docker stop opentcs-web 2>/dev/null || true
            docker rm opentcs-web 2>/dev/null || true
            
            # 启动新容器
            docker run -d --name opentcs-web -p 80:80 opentcs-web:latest
            
            echo "Frontend deployment completed!"
