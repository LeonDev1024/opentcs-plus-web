name: Deploy to Server

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            # 登录 GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新前端镜像
            docker pull ghcr.io/LeonDev1024/opentcs-plus-web/frontend:latest

            # 创建临时容器并复制静态文件到宿主机
            docker create --name temp-frontend ghcr.io/LeonDev1024/opentcs-plus-web/frontend:latest
            docker cp temp-frontend:/usr/share/nginx/html/. /var/www/opentcs/
            docker rm temp-frontend

            # 确保 Nginx 正在运行
            sudo nginx -t && sudo systemctl reload nginx || sudo nginx

            echo "Frontend deployment completed!"
